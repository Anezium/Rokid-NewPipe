name: Rokid Glasses Build

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:
    inputs:
      run_connected_tests:
        description: "Run connected Android tests when the runner has a device"
        required: false
        type: boolean
        default: false

jobs:
  build-test-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Rokid debug APK and run JVM tests
        run: ./gradlew :app:assembleDebug :app:testDebugUnitTest --stacktrace -DskipFormatKtlint

      - name: Upload Rokid debug APK
        uses: actions/upload-artifact@v4
        with:
          name: rokid-newpipe-debug-apk
          path: app/build/outputs/apk/debug/*.apk

  connected-smoke:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_connected_tests }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run connected Android checks
        run: ./gradlew :app:connectedDebugAndroidTest --stacktrace -DskipFormatKtlint
