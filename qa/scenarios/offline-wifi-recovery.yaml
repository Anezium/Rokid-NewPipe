id: offline-wifi-recovery
name: "Offline state exposes a focusable Wi-Fi settings recovery button"
risk: high
app: Rokid-NewPipe
requires:
  phone: false
  glasses: true
  network: false
build:
  commands:
    - .\gradlew.bat :app:testDebugUnitTest
    - .\gradlew.bat :app:assembleDebug
steps:
  -
    type: launch
    target: glasses
    package: com.anezium.rokid.newpipe
  -
    type: keyevent
    target: glasses
    keys:
      - 22
      - 23
  -
    type: current-window
    target: glasses
expect:
  state:
    wifiSettingsOpened: true
artifacts:
  - glasses_logcat
  - screenshot
notes:
  - "Works when the home feed reports no active network; if Wi-Fi is already connected, assert that videos load instead."
