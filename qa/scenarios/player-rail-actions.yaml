id: player-rail-actions
name: "Player rail is temporary and exposes all glasses actions"
risk: high
app: Rokid-NewPipe
requires:
  phone: false
  glasses: true
  network: true
build:
  commands:
    - .\gradlew.bat :app:testDebugUnitTest
    - .\gradlew.bat :app:assembleDebug
steps:
  -
    type: open-url
    target: glasses
    data: "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
  -
    type: keyevent
    target: glasses
    keys:
      - 23
      - 22
      - 22
      - 22
      - 22
      - 22
  -
    type: sleep
    ms: 5000
  -
    type: screenshot
    target: glasses
expect:
  state:
    actionsReachable:
      - Play
      - Full
      - Quality
      - Speed
      - Subs
      - Close
    railAutoHides: true
artifacts:
  - glasses_logcat
  - screenshot
notes:
  - "Needs network; offline devices can only validate compile-time binding and focus order."
