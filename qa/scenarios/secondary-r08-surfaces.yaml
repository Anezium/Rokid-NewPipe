id: secondary-r08-surfaces
name: "Secondary NewPipe surfaces expose R08-friendly Accessibility rows"
risk: medium
app: Rokid-NewPipe
requires:
  phone: false
  glasses: true
  accessibility: true
build:
  commands:
    - .\gradlew.bat :app:testDebugUnitTest
    - .\gradlew.bat :app:assembleDebug
steps:
  -
    type: static-check
    target: workspace
    checks:
      - noTodoContentDescriptions
  -
    type: navigate
    target: glasses
    surfaces:
      - downloads
      - playQueue
      - chapters
      - settingsSearch
      - settingsSelectors
      - notificationActions
      - errorReport
      - routerShareChooser
      - recaptchaWebView
      - playlistTextDialogs
      - feedGroupDialog
      - feedGroupReorderDialog
      - downloadDialog
      - filePicker
      - tabSelectors
      - subscriptionImport
      - tabReorder
      - peertubeInstanceReorder
      - localPlaylistReorder
      - bookmarkPlaylistReorder
      - playQueueReorder
      - infoItemContextDialog
      - playQueueContextDialog
      - playlistAppendDialog
      - feedDialogs
      - subscriptionContextDialog
      - notificationActionDialog
      - historySettingsDialogs
      - errorPrivacyPolicyDialog
      - playbackParameterDialog
      - downloadItemContextDialog
      - downloadHistoryDialogs
      - backupRestoreDialogs
      - externalPlayerInstallDialogs
      - migrationInfoDialog
      - composeAboutActivity
      - snackbarActions
      - appOwnedShareChooser
      - downloadOpenShareChooser
      - externalUrlAppChooser
      - androidSettingsConfirmations
      - systemFilePickerConfirmations
  -
    type: uiautomator-dump
    target: glasses
expect:
  state:
    downloadRowsHaveLabels: true
    downloadMoreButtonsHaveLabels: true
    downloadActivityUsesRokidKeyMapper: true
    downloadDialogUsesRokidKeyMapper: true
    downloadDialogHidesThreadSeekbarFromAccessibility: true
    downloadDialogCyclesSpinnersAndThreads: true
    downloadDialogUsesLocalizedRokidActionHints: true
    filePickerActivityUsesRokidKeyMapper: true
    playQueueRowsHaveLabels: true
    playQueueActivityUsesRokidKeyMapper: true
    playQueueActivityControlsHaveLabels: true
    playQueueRecyclerContainerNotFocusableInRokidMode: true
    recyclerEndDoesNotSwallowForwardFocusMove: true
    recyclerRowsExposeSecondaryActionsInFocusOrder: true
    longClickableOnlyTargetsActivateWithR08Tap: true
    playQueueRowsHaveNonDragReorderAction: true
    infoItemContextDialogUsesRokidKeyMapper: true
    playQueueContextDialogAvoidsPopupMenuInRokidMode: true
    playlistAppendDialogUsesRokidKeyMapper: true
    feedDialogsUseRokidKeyMapper: true
    subscriptionContextDialogUsesRokidKeyMapper: true
    subscriptionImportExportAvoidsAndroidSubmenus: true
    notificationActionDialogUsesRokidKeyMapper: true
    historySettingsDialogsUseRokidKeyMapper: true
    errorPrivacyPolicyDialogUsesRokidKeyMapper: true
    downloadItemContextDialogAvoidsPopupMenuInRokidMode: true
    downloadHistoryDialogsUseRokidKeyMapper: true
    backupRestoreDialogsUseRokidKeyMapper: true
    externalPlayerInstallDialogsUseRokidKeyMapper: true
    migrationInfoDialogUsesRokidKeyMapper: true
    snackbarActionsFocusActionButton: true
    shareUtilsUsesRokidDialogChooser: true
    externalImplicitIntentsUseRokidChooser: true
    externalIntentChooserClearsSelectorBeforeLaunch: true
    downloadFileOpenShareAvoidSystemChooserInRokidMode: true
    composeActivityUsesOneAxisRokidKeyNavigation: true
    composeActivityDebouncesDirectionalAliases: true
    composeActivityMapsDoubleTapToSelect: true
    composeActivityFocusesRootForFirstSwipe: true
    aboutScreenDoesNotUseRemovedLegacyActivity: true
    playerItemsListContainerNotFocusableInRokidMode: true
    playerQueueRowsHaveNonDragReorderAction: true
    playQueueSpeedActionAvoidsSliderDialogInRokidMode: true
    playbackParameterDialogUsesRokidKeyMapper: true
    playbackParameterDialogHidesSeekbarsFromAccessibility: true
    playbackParameterDialogUsesLocalizedActionHints: true
    chapterRowsHaveLabels: true
    settingsSearchRowsHaveLabels: true
    settingsActivityUsesRokidKeyMapper: true
    settingsSearchUsesRokidKeyboard: true
    androidXPreferenceDialogsUseRokidNavigation: true
    androidXEditTextPreferenceUsesRokidKeyboard: true
    appLanguageSettingAvoidsSystemSettingsInRokidMode: true
    androidSettingsLaunchesUseRokidConfirmation: true
    wifiSettingsLaunchUsesRokidConfirmation: true
    notificationSettingsLaunchUsesRokidConfirmation: true
    captionSettingsLaunchUsesRokidConfirmation: true
    soundSettingsLaunchUsesRokidConfirmation: true
    storageSettingsLaunchUsesRokidConfirmation: true
    overlayPermissionLaunchUsesRokidConfirmation: true
    systemFilePickersUseRokidConfirmation: true
    routerShareChooserUsesRokidDialogNavigation: true
    recaptchaActivityUsesRokidKeyMapper: true
    playlistCreationUsesRokidKeyboard: true
    playlistRenameUsesRokidKeyboard: true
    bookmarkRenameUsesRokidKeyboard: true
    localPlaylistRowsHaveNonDragReorderAction: true
    bookmarkRowsHaveNonDragReorderAction: true
    peertubeInstanceAddUsesRokidKeyboard: true
    feedGroupNameUsesRokidKeyboard: true
    feedGroupSearchUsesRokidKeyboard: true
    feedGroupReorderHasNonDragAction: true
    subscriptionImportUrlUsesRokidKeyboard: true
    settingsSelectorDialogsUseRokidKeyMapper: true
    addTabDialogUsesRokidKeyMapper: true
    chooseTabsHasNonDragReorderAction: true
    peertubeInstancesHaveNonDragReorderAction: true
    dialogKeyboardOverlayUsesActiveWindow: true
    rokidKeyboardEnterKeyUsesContextLabel: true
    rokidKeyboardLabelsUseStringResources: true
    selectorRowsHaveLabels: true
    notificationActionAreasHaveLabels: true
    errorActivityUsesRokidKeyMapper: true
    errorActivityShareUsesActivityContext: true
    decorativeImagesAreNotFocusable: true
    noUnnamedFocusableActions: true
artifacts:
  - secondary-surfaces-uiautomator.xml
  - secondary-surfaces-rokid-state.json
  - glasses_logcat
notes:
  - "This scenario should be driven by the R08 Access Bridge when hardware is connected; static checks only prevent obvious XML regressions."
  - "Rows should consolidate their visible text into one contentDescription while thumbnails/icons/drag handles stay decorative."
  - "The full play queue activity must route R08 key events through RokidFocusNavigator and leave row items, not the RecyclerView container, as the navigable targets."
  - "RecyclerView end-of-list navigation must not swallow a forward R08 move without changing focus."
  - "Rows with a secondary move action should expose the row and its handle as separate focus stops."
  - "If a focused target only has a long-click action, R08 tap should activate that action instead of leaving the focus stop inert."
  - "Download and Settings activities must route R08 key events too; they are not hosted by MainActivity."
  - "The error report activity should still be traversable with R08 navigation if the app opens it on-device."
  - "Error report sharing should pass an Activity context so ShareUtils can show the NewPipe R08 chooser instead of Android's resolver."
  - "Settings search should use the Rokid keyboard overlay instead of opening the Android soft keyboard."
  - "AndroidX ListPreference, MultiSelectListPreference, and EditTextPreference dialogs should use NewPipe-owned R08 dialog navigation instead of default Preference dialogs."
  - "The app-language setting should stay inside NewPipe in Rokid mode instead of launching Android's per-app-language settings."
  - "Android settings screens that cannot be owned by NewPipe should be opened through a NewPipe R08 confirmation dialog with Cancel and an explicit Open settings action."
  - "Android file/document pickers that cannot be owned by NewPipe should also be opened through a NewPipe R08 confirmation dialog instead of launching DocumentsUI immediately."
  - "AlertDialog and DialogFragment windows should attach their own R08 key listener; their events may not pass through MainActivity."
  - "Text-entry dialogs should mount the Rokid keyboard in the active dialog window so the keyboard is visible and accessible above the dialog."
  - "The Rokid keyboard action key should announce the current action, such as Search, Done, Import, OK, Rename, or Create, instead of always announcing Search."
  - "The Rokid keyboard key labels and selected-key prefix should come from string resources so Access Bridge speech is localizable."
  - "Download options should be discrete in Rokid mode: tap cycles media/quality/audio/threads instead of opening spinner popups or requiring a SeekBar drag."
  - "DownloadDialog R08 content descriptions should announce the control, current value, and tap action through string resources instead of hardcoded English text."
  - "Feed group reorder must not require drag in Rokid mode; tap on a row should provide a repeatable move action and OK should persist."
  - "The app-owned file picker must route R08 key events because import/export and download-folder flows can leave MainActivity."
  - "Subscription import by channel URL should use the Rokid keyboard and submit from the keyboard go action."
  - "Tab ordering and PeerTube instance ordering should expose a discrete move-down action so drag handles are not required."
  - "Local playlists, bookmark playlists, and play queue rows should expose a discrete move-down action so drag handles are not required."
  - "Video row context actions, play queue row context actions, and playlist append dialogs should be real R08-navigable dialogs."
  - "Feed, subscription, notification action, history/settings, and error/privacy dialogs should attach the same R08 dialog key listener."
  - "Subscription import/export should avoid Android submenus in Rokid mode and open NewPipe-owned R08 dialogs instead."
  - "Download item menus, download history confirmations, backup/restore prompts, external-player install prompts, and migration info dialogs should attach the same R08 dialog key listener."
  - "Snackbar action buttons should become focusable and receive focus when shown so tap can activate Undo, Settings, error report, or notification actions."
  - "Open-with/share choices owned by NewPipe should use a R08-navigable dialog instead of relying only on the system chooser."
  - "External URL/app intents should resolve through the R08 dialog chooser when multiple apps can handle them, instead of dropping the ring into Android's system resolver."
  - "The selected external app should launch through an explicit intent with selector state cleared while preserving URI grants from the source intent."
  - "Compose-hosted screens such as About and Licenses should move focus with the same one-axis R08 keys and debounce paired aliases."
  - "PlaybackParameterDialog should remain navigable if reached in Rokid mode: skip SeekBars and use labeled +/- or mode controls."
  - "PlaybackParameterDialog action hints and selected/on/off states should be string-backed so Access Bridge speech is localizable."
