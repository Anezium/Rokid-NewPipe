id: search-keyboard-swipe
name: "Swipe navigation reaches Search and tap opens the Rokid keyboard"
risk: high
app: Rokid-NewPipe
requires:
  phone: false
  glasses: true
  accessibility: false
build:
  commands:
    - .\gradlew.bat :app:testDebugUnitTest
    - .\gradlew.bat :app:assembleDebug
steps:
  -
    type: launch
    target: glasses
    package: com.anezium.rokid.newpipe
  -
    type: keyevent
    target: glasses
    keys:
      - 21
      - 23
  -
    type: screenshot
    target: glasses
expect:
  state:
    rightDownAliasMovesOnce: true
    leftUpAliasMovesOnce: true
    actionUpIgnored: true
    repeatedDirectionalKeyIgnored: true
    searchFocusable: true
    keyboardOverlayVisibleAfterTap: true
    keyboardHasFocusableKeys: true
    keyboardIncludesVoiceKey: true
    dialogKeyboardOmitsVoiceKeyWhenUnavailable: true
    keyboardIncludesSearchKey: true
artifacts:
  - glasses_logcat
  - screenshot
  - uiautomator.xml
notes:
  - "R08 Stable mode maps backward/forward to previous/next media keys; MainActivity maps those to one-axis focus."
  - "Unit tests cover RIGHT+DOWN, LEFT+UP, custom 183/184 swipe keys, ACTION_UP, and repeated ACTION_DOWN events."
  - "The Rokid keyboard exposes each key as a clickable/focusable Accessibility node."
  - "Text dialogs without a voice callback should omit the Voice search key instead of exposing a dead action."
